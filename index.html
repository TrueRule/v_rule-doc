<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <title>项目文档中心</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">文档加载中，请稍候...</div>
  <script>
    window.$docsify = {
      name: 'VRule',
      repo: 'https://github.com/vgbhfive/v_rule-web', // 右上角挂件地址
      loadSidebar: true,   // 开启侧边栏
      homepage: 'main.md',
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md' // 防止子目录找不到侧边栏
      },
      subMaxLevel: 3,      // 侧边栏显示 H1-H3 标题
      auto2top: true,      // 切换页面后自动回到顶部
      // 全文搜索配置
      search: {
        placeholder: '搜索...',
        noData: '未找到结果',
        depth: 6
      },
      // 字数统计配置
      count:{
        countable: true,
        fontsize: '0.9em',
        color: 'rgb(90,90,90)',
        language: 'chinese'
      },
      pagination: {
        previousText: '上一页',
        nextText: '下一页',
        crossChapter: true, // 开启跨章节切换
        crossChapterText: true, // 包含章节名
      },
    }
  </script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-count/dist/countable.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <!-- 分页插件的 CSS (可选，用于美化) -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.css">
  <!-- 分页插件 JS -->
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
</body>
</html>
